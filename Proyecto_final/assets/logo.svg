<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- Marco blanco interno -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Número 16 -->
  <text x="50" y="65" font-size="48" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">16</text>
  
  <!-- Texto "semanas" -->
  <text x="50" y="85" font-size="14" fill="white" text-anchor="middle" font-family="Arial, sans-serif">SEMANAS</text>
</svg>

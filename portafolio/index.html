<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio — Base de Datos II</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0e1a;
  --surface:#111827;
  --surface2:#1a2235;
  --border:#1e2d45;
  --accent:#00d4ff;
  --accent2:#7c3aed;
  --accent3:#10b981;
  --text:#e2e8f0;
  --text-muted:#64748b;
  --danger:#ef4444;
  --warning:#f59e0b;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid var(--border);
  background:rgba(10,14,26,.85);
  backdrop-filter:blur(12px);
}

.header-left{
  display:flex;
  align-items:center;
  gap:16px;
}

.logo-upla{
  width:64px;
  height:64px;
  border-radius:12px;
  overflow:hidden;
  border:2px solid var(--accent);
  box-shadow:0 0 16px rgba(0,212,255,.35);
  background:white;
}

.logo-upla img{
  width:100%;
  height:100%;
  object-fit:contain;
  padding:4px;
}

.header-titles h1{
  font-size:1.3rem;
  font-weight:800;
}

.header-titles h1 span{
  color:var(--accent);
}

.header-titles p{
  font-size:.72rem;
  color:var(--text-muted);
  font-family:'Space Mono', monospace;
}

.header-right{
  display:flex;
  gap:12px;
}

.badge-repo{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  text-decoration:none;
  color:var(--text-muted);
  font-size:.75rem;
  transition:.2s;
}

.badge-repo:hover{
  border-color:var(--accent);
  color:var(--accent);
}

.btn-refresh{
  display:flex;
  align-items:center;
  gap:6px;
  padding:9px 16px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#0099cc);
  color:black;
  font-weight:700;
  cursor:pointer;
}

/* HERO */

.hero{
  text-align:center;
  padding:50px 40px 30px;
}

.hero-label{
  display:inline-block;
  font-family:'Space Mono', monospace;
  font-size:.7rem;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--accent);
  background:rgba(0,212,255,.08);
  border:1px solid rgba(0,212,255,.25);
  padding:6px 16px;
  border-radius:100px;
  margin-bottom:16px;
}

.hero h2{
  font-size:clamp(2rem,5vw,3.2rem);
  font-weight:800;
}

.hero .hl{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:var(--text-muted);
  margin-top:10px;
}

/* STATS */

.stats-bar{
  display:flex;
  margin:28px 40px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}

.stat{
  flex:1;
  text-align:center;
  padding:18px 12px;
  border-right:1px solid var(--border);
}

.stat:last-child{
  border-right:none;
}

.stat-num{
  font-size:1.8rem;
  font-weight:800;
  font-family:'Space Mono', monospace;
}

.stat-label{
  font-size:.68rem;
  color:var(--text-muted);
  margin-top:4px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  font-family:'Space Mono', monospace;
}

/* MAIN */

.main{
  max-width:1400px;
  margin:auto;
  padding:0 40px 60px;
}

/* UNIT */

.unit{
  margin-bottom:48px;
}

.unit-header{
  display:flex;
  gap:14px;
  margin-bottom:20px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border);
}

.unit-dot{
  width:42px;
  height:42px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-family:'Space Mono', monospace;
}

.unit:nth-child(1) .unit-dot{
  background:rgba(0,212,255,.15);
  color:#00d4ff;
}

.unit:nth-child(2) .unit-dot{
  background:rgba(124,58,237,.15);
  color:#7c3aed;
}

.unit:nth-child(3) .unit-dot{
  background:rgba(16,185,129,.15);
  color:#10b981;
}

.unit:nth-child(4) .unit-dot{
  background:rgba(245,158,11,.15);
  color:#f59e0b;
}

/* WEEKS */

.weeks-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:14px;
}

.week-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  transition:.2s;
}

.week-card:hover{
  transform:translateY(-2px);
}

.week-card-head{
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}

.week-title{
  font-weight:700;
  margin-top:2px;
}

.week-num{
  font-size:.7rem;
  color:var(--text-muted);
  font-family:'Space Mono', monospace;
}

.week-body{
  display:none;
  padding:14px 16px;
}

.week-card.open .week-body{
  display:block;
}

.actions-row{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.btn{
  flex:1;
  padding:8px 10px;
  border:none;
  border-radius:7px;
  cursor:pointer;
  font-weight:700;
}

.btn-upload{
  background:rgba(16,185,129,.12);
  color:var(--accent3);
}

.btn-github{
  background:rgba(0,212,255,.1);
  color:var(--accent);
}

/* FILES */

.files-list{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.files-list-empty{
  text-align:center;
  padding:20px;
  color:var(--text-muted);
  border:1px dashed var(--border);
  border-radius:8px;
}

.file-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:9px 10px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
}

.file-icon{
  width:28px;
  height:28px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.58rem;
  font-weight:700;
  background:rgba(239,68,68,.15);
  color:#ef4444;
}

.file-name{
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.file-actions{
  display:flex;
  gap:4px;
}

.btn-view-file,
.btn-del-file{
  padding:4px 8px;
  border-radius:5px;
  border:none;
  cursor:pointer;
  font-size:.68rem;
}

.btn-view-file{
  background:rgba(0,212,255,.08);
  color:var(--accent);
}

.btn-del-file{
  background:rgba(239,68,68,.08);
  color:var(--danger);
}

/* FOOTER */

footer{
  text-align:center;
  padding:24px;
  border-top:1px solid var(--border);
  font-size:.72rem;
  color:var(--text-muted);
}

/* RESPONSIVE */

@media(max-width:768px){

  header{
    flex-wrap:wrap;
    padding:14px 20px;
  }

  .main{
    padding:0 16px 40px;
  }

  .hero{
    padding:30px 20px 20px;
  }

  .stats-bar{
    margin:16px;
    flex-wrap:wrap;
  }

  .weeks-grid{
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body>

<header>

  <div class="header-left">

    <div class="logo-upla">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/UPLA_logo.png/240px-UPLA_logo.png">
    </div>

    <div class="header-titles">
      <h1>PORT<span>AFOLIO</span></h1>
      <p>Ing. de Sistemas · Base de Datos II</p>
    </div>

  </div>

  <div class="header-right">

    <a class="badge-repo"
       href="https://github.com/josue12335/Proyecto_final"
       target="_blank">
       GitHub
    </a>

    <button class="btn-refresh" onclick="loadAllWeeks()">
      Sincronizar GitHub
    </button>

  </div>

</header>

<div class="hero">
  <div class="hero-label">Portafolio Académico 2024</div>
  <h2>Base de Datos <span class="hl">II</span></h2>
  <p>Repositorio de evidencias por semana</p>
</div>

<div class="stats-bar">

  <div class="stat">
    <div class="stat-num">4</div>
    <div class="stat-label">Unidades</div>
  </div>

  <div class="stat">
    <div class="stat-num">16</div>
    <div class="stat-label">Semanas</div>
  </div>

  <div class="stat">
    <div class="stat-num" id="stat-files">0</div>
    <div class="stat-label">Archivos</div>
  </div>

  <div class="stat">
    <div class="stat-num" id="stat-weeks-with">0</div>
    <div class="stat-label">Con archivos</div>
  </div>

</div>

<main class="main" id="main-content"></main>

<footer>
  PORTAFOLIO · Ingeniería de Sistemas · Base de Datos II
</footer>

<script>

/* CONFIG */

const REPO_OWNER  = 'josue12335';
const REPO_NAME   = 'Proyecto_final';
const REPO_BRANCH = 'main';

const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;
const GH_BASE  = `https://github.com/${REPO_OWNER}/${REPO_NAME}`;

/* RUTAS CORRECTAS */

const UNITS = [

{
  num:1,
  title:'Fundamentos y Modelado Relacional',
  desc:'Semanas 1–4',

  weeks:[
    {n:1,title:'Introducción a BD II',path:'portafolio/semanas/semana-01'},
    {n:2,title:'Modelo Entidad-Relación',path:'portafolio/semanas/semana-02'},
    {n:3,title:'Normalización',path:'portafolio/semanas/semana-03'},
    {n:4,title:'SQL Avanzado',path:'portafolio/semanas/semana-04'},
  ]
},

{
  num:2,
  title:'Consultas Avanzadas y Optimización',
  desc:'Semanas 5–8',

  weeks:[
    {n:5,title:'Subconsultas y Vistas',path:'portafolio/semanas/semana-05'},
    {n:6,title:'Índices y Rendimiento',path:'portafolio/semanas/semana-06'},
    {n:7,title:'Procedimientos Almacenados',path:'portafolio/semanas/semana-07'},
    {n:8,title:'Triggers y Funciones',path:'portafolio/semanas/semana-08'},
  ]
},

{
  num:3,
  title:'Administración y Seguridad',
  desc:'Semanas 9–12',

  weeks:[
    {n:9,title:'Transacciones y Concurrencia',path:'portafolio/semanas/semana-09'},
    {n:10,title:'Respaldo y Recuperación',path:'portafolio/semanas/semana-10'},
    {n:11,title:'Seguridad en Bases de Datos',path:'portafolio/semanas/semana-11'},
    {n:12,title:'Usuarios y Privilegios',path:'portafolio/semanas/semana-12'},
  ]
},

{
  num:4,
  title:'Tecnologías Emergentes y Proyecto',
  desc:'Semanas 13–16',

  weeks:[
    {n:13,title:'Bases de Datos NoSQL',path:'portafolio/semanas/semana-13'},
    {n:14,title:'Big Data e Integración',path:'portafolio/semanas/semana-14'},
    {n:15,title:'Proyecto Final – Avance',path:'portafolio/semanas/semana-15'},
    {n:16,title:'Proyecto Final – Presentación',path:'portafolio/semanas/semana-16'},
  ]
}

];

const filesCache = {};

/* BUILD UI */

function buildUI(){

  const main = document.getElementById('main-content');

  UNITS.forEach(unit=>{

    const unitEl = document.createElement('div');

    unitEl.className = 'unit';

    unitEl.innerHTML = `
      <div class="unit-header">

        <div class="unit-dot">
          U${unit.num}
        </div>

        <div>
          <h3>${unit.title}</h3>
          <p>${unit.desc}</p>
        </div>

      </div>

      <div class="weeks-grid" id="unit-${unit.num}">
      </div>
    `;

    main.appendChild(unitEl);

    const grid = document.getElementById(`unit-${unit.num}`);

    unit.weeks.forEach(week=>{
      grid.appendChild(buildWeekCard(week));
    });

  });

}

function buildWeekCard(week){

  const card = document.createElement('div');

  card.className = 'week-card';

  card.id = `week-${week.n}`;

  card.innerHTML = `

    <div class="week-card-head" onclick="toggleWeek(${week.n})">

      <div>
        <div class="week-num">
          Semana ${week.n}
        </div>

        <div class="week-title">
          ${week.title}
        </div>
      </div>

      <div>▼</div>

    </div>

    <div class="week-body" id="body-${week.n}">

      <div class="actions-row">

        <button class="btn btn-github"
                onclick="openGitHubFolder('${week.path}')">
          Ver GitHub
        </button>

      </div>

      <div class="files-list" id="files-${week.n}">
        <div class="files-list-empty">
          Cargando...
        </div>
      </div>

    </div>

  `;

  return card;

}

/* TOGGLE */

function toggleWeek(n){

  const card = document.getElementById(`week-${n}`);

  card.classList.toggle('open');

  if(card.classList.contains('open')){
    loadWeekFiles(n);
  }

}

/* FIND WEEK */

function findWeek(n){

  for(const u of UNITS){

    const w = u.weeks.find(x=>x.n===n);

    if(w) return w;

  }

  return null;

}

/* LOAD FILES */

async function loadWeekFiles(weekNum){

  const week = findWeek(weekNum);

  const listEl = document.getElementById(`files-${weekNum}`);

  if(filesCache[weekNum]){
    renderFiles(weekNum, filesCache[weekNum]);
    return;
  }

  try{

    const pathsToTry = [
      week.path,
      `${week.path}/`
    ];

    let files = [];

    for(const path of pathsToTry){

      const res = await fetch(
        `${API_BASE}/contents/${path}?ref=${REPO_BRANCH}`
      );

      if(res.ok){

        const data = await res.json();

        if(Array.isArray(data)){

          files = data.filter(f=>f.type==='file');

          break;

        }

      }

    }

    filesCache[weekNum] = files;

    renderFiles(weekNum, files);

    updateStats();

  }catch(err){

    listEl.innerHTML = `
      <div class="files-list-empty">
        Error al cargar archivos
      </div>
    `;

  }

}

/* RENDER FILES */

function renderFiles(weekNum, files){

  const listEl = document.getElementById(`files-${weekNum}`);

  if(files.length===0){

    listEl.innerHTML = `
      <div class="files-list-empty">
        Sin archivos
      </div>
    `;

    return;
  }

  listEl.innerHTML = '';

  files.forEach(file=>{

    const item = document.createElement('div');

    item.className = 'file-item';

    item.innerHTML = `

      <div class="file-icon">
        FILE
      </div>

      <div class="file-name">
        ${file.name}
      </div>

      <div class="file-actions">

        <a class="btn-view-file"
           href="${file.download_url}"
           target="_blank">
           Ver
        </a>

      </div>

    `;

    listEl.appendChild(item);

  });

}

/* OPEN GITHUB */

function openGitHubFolder(path){

  const url = `${GH_BASE}/tree/${REPO_BRANCH}/${path}`;

  window.open(url,'_blank');

}

/* STATS */

function updateStats(){

  let totalFiles = 0;
  let weeksWithFiles = 0;

  Object.values(filesCache).forEach(files=>{

    totalFiles += files.length;

    if(files.length>0){
      weeksWithFiles++;
    }

  });

  document.getElementById('stat-files').textContent = totalFiles;
  document.getElementById('stat-weeks-with').textContent = weeksWithFiles;

}

/* LOAD ALL */

async function loadAllWeeks(){

  for(const unit of UNITS){

    for(const week of unit.weeks){

      const card = document.getElementById(`week-${week.n}`);

      card.classList.add('open');

      await loadWeekFiles(week.n);

    }

  }

}

/* INIT */

buildUI();

setTimeout(()=>{
  toggleWeek(1);
},300);

</script>

</body>
</html>
